AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Functionless URL Shortener

###################################################################################################
##   Template Parameters                                                                         ##
###################################################################################################
Parameters:
  AppName:
    Type: String
    Description: Name of application (no spaces). Value must be globally unique
    Default: shortener

###################################################################################################
##   Template Resources                                                                          ##
###################################################################################################
Resources:
  ##   API Gateway
  UrlShortenerAPI:
    Type: AWS::Serverless::Api
    Properties:
      Description: "URL Shortener API. Use API Key to access this service. See: https://github.com/bfansports/amazon-api-gateway-url-shortener.git"
      StageName: Prod
      EndpointConfiguration:
        Type: EDGE
      TracingEnabled: true
      Auth:
        ApiKeyRequired: false
      MethodSettings:
        - HttpMethod: "*"
          ResourcePath: "/*"
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingRateLimit: 2000
          ThrottlingBurstLimit: 1000
        - HttpMethod: "GET"
          ResourcePath: "/{linkId}"
          ThrottlingRateLimit: 10000
          ThrottlingBurstLimit: 4000
      AccessLogSetting:
        DestinationArn: !GetAtt AccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","status":$context.status,"resourcePath":"$context.resourcePath","httpMethod":"$context.httpMethod","path":"$context.path","domain":"$context.domainName"}'
      DefinitionBody:
        "Fn::Transform":
          Name: "AWS::Include"
          Parameters:
            Location: "./api.yaml"

  ##   Access Log Group for API Gateway
  AccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AppName}/access-logs"
      RetentionInDays: 30

  ##   URL DynamoDB Table
  LinkTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UrlShortenerLinks
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expiration
        Enabled: true
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: owner
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: OwnerIndex
          KeySchema:
            - AttributeName: owner
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # API key definitions
  ShortenerApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: Shortener API Key
      Description: API Key to be used by shortener users
      Enabled: true
      StageKeys:
        - RestApiId: !Ref UrlShortenerAPI
          StageName: Prod

  # Linking of API keys to usage plans
  ShortenerUsagePlanKey:
    Type: "AWS::ApiGateway::UsagePlanKey"
    Properties:
      KeyId: !Ref ShortenerApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref ShortenerUsagePlan

  ShortenerUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: bfan shortener Usage Plan
      Description: Usage plan for external providers pushing data to bfan
      ApiStages:
        - ApiId: !Ref UrlShortenerAPI
          Stage: Prod
      Quota:
        Limit: 5000
        Period: MONTH
      Throttle:
        BurstLimit: 200
        RateLimit: 100

  ###################################################################################################
  ##   IAM Roles                                                                                   ##
  ###################################################################################################

  ##   Dynamo DB Read Role
  DDBReadRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "apigateway.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: DDBReadPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Effect: Allow
                Resource:
                  - !GetAtt LinkTable.Arn
                  - !Sub
                    - ${TableArn}/index/*
                    - { TableArn: !GetAtt LinkTable.Arn }

  ##   Dynamo DB Read/Write Role
  DDBCrudRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "apigateway.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: DDBCrudPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - dynamodb:DeleteItem
                  - dynamodb:UpdateItem
                Effect: Allow
                Resource: !GetAtt LinkTable.Arn

  ##   Amplify Hosting Role
  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: Amplify
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: "amplify:*"
                Resource: "*"

  ## CloudWatchRole for aws gateway account
  Account:
    Type: "AWS::ApiGateway::Account"
    Properties:
      CloudWatchRoleArn: !GetAtt CloudWatchRole.Arn

  CloudWatchRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action: "sts:AssumeRole"
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  ###################################################################################################
  ##   Metrics outputs                                                                            ##
  ###################################################################################################

  APIGateway4xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "URL Shortener API 4xx Alarm"
      AlarmDescription: "4xx monitor (excluding expired/missing link 404s and scanner 403s on /{linkId}, /, and unknown paths)"
      Metrics:
        - Id: total4xx
          MetricStat:
            Metric:
              Namespace: "AWS/ApiGateway"
              MetricName: "4XXError"
              Dimensions:
                - Name: "ApiName"
                  Value: "URL Shortener API"
            Period: 60
            Stat: "Sum"
          ReturnData: false
        - Id: expired404s
          MetricStat:
            Metric:
              Namespace: !Sub "${AppName}/URLShortener"
              MetricName: "ExpiredLinkAccess"
            Period: 60
            Stat: "Sum"
          ReturnData: false
        - Id: scanner403s
          MetricStat:
            Metric:
              Namespace: !Sub "${AppName}/URLShortener"
              MetricName: "ScannerAccess"
            Period: 60
            Stat: "Sum"
          ReturnData: false
        - Id: unexpectedErrors
          Expression: "total4xx - FILL(expired404s, 0) - FILL(scanner403s, 0)"
          Label: "Unexpected 4xx Errors"
          ReturnData: true
      ComparisonOperator: "GreaterThanThreshold"
      Threshold: 0
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !ImportValue EmailNotificationTopic

  APIGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "URL Shortener API 5xx Alarm"
      AlarmDescription: "5xx monitor"
      MetricName: "5XXError"
      Namespace: "AWS/ApiGateway"
      Dimensions:
        - Name: "ApiName"
          Value: "URL Shortener API"
      Statistic: "Average"
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0.01
      ComparisonOperator: "GreaterThanThreshold"
      AlarmActions:
        - !ImportValue EmailNotificationTopic

  APIGatewayLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "URL Shortener API Latency Alarm"
      AlarmDescription: "Latency monitor"
      MetricName: "Latency"
      Namespace: "AWS/ApiGateway"
      Dimensions:
        - Name: "ApiName"
          Value: "URL Shortener API"
      ExtendedStatistic: "p99"
      Period: 300
      EvaluationPeriods: 1
      Threshold: 75
      ComparisonOperator: "GreaterThanThreshold"
      AlarmActions:
        - !ImportValue EmailNotificationTopic

  DDB5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "URL Shortener DDB 5xx Alarm"
      AlarmDescription: "System monitor"
      MetricName: "SystemErrors"
      Namespace: "AWS/DynamoDB"
      Dimensions:
        - Name: "TableName"
          Value: !Ref LinkTable
      Statistic: "Average"
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0.01
      ComparisonOperator: "GreaterThanThreshold"
      AlarmActions:
        - !ImportValue EmailNotificationTopic

  DDB4xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "URL Shortener DDB 4xx Alarm"
      AlarmDescription: "User monitor"
      MetricName: "UserErrors"
      Namespace: "AWS/DynamoDB"
      Dimensions:
        - Name: "TableName"
          Value: !Ref LinkTable
      Statistic: "Average"
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0.10
      ComparisonOperator: "GreaterThanThreshold"
      AlarmActions:
        - !ImportValue EmailNotificationTopic

  ##   Metric filter: count 404s on /{linkId} (expired or missing links) — logged but not alarmed
  ExpiredLinkMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AccessLogGroup
      FilterPattern: '{ $.status = 404 && $.resourcePath = "/{linkId}" }'
      MetricTransformations:
        - MetricName: "ExpiredLinkAccess"
          MetricNamespace: !Sub "${AppName}/URLShortener"
          MetricValue: "1"
          DefaultValue: 0

  ##   Metric filter: count 403s on unknown paths or /{linkId} (scanner/bot traffic) — logged but not alarmed
  ScannerAccessMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AccessLogGroup
      FilterPattern: '{ ($.status = 403 && $.resourcePath = "") || ($.status = 403 && $.resourcePath = "/") || ($.status = 403 && $.resourcePath = "/{linkId}") }'
      MetricTransformations:
        - MetricName: "ScannerAccess"
          MetricNamespace: !Sub "${AppName}/URLShortener"
          MetricValue: "1"
          DefaultValue: 0
